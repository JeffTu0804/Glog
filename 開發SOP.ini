## 登入與 Session 分離

- **飯店員工**：LINE 登入 → session 存在 `glog-hotel-auth`（localStorage）
- **平台 Manager**：Gmail 登入 → session 存在 `glog-manager-auth`（localStorage）
- 兩邊 session 互不覆蓋，可同瀏覽器同時登入不同身分

## LINE 登入設定

Supabase 專案目前**沒有內建 LINE provider**，程式走「後端自訂 LINE OAuth」。

### 1. backend/.env 必填
SUPABASE_SERVICE_ROLE_KEY=（Supabase → Project Settings → API → service_role secret）
LINE_CHANNEL_ID=（LINE Developers → Channel ID）
LINE_CHANNEL_SECRET=（LINE Developers → Channel Secret）
LINE_REDIRECT_URI=http://localhost:3000/api/v1/auth/line/callback
FRONTEND_URL=http://localhost:5173
BACKEND_PUBLIC_URL=http://localhost:3000

### 2. LINE Developers Console
Callback URL 填**後端**網址（不是 supabase.co）：
http://localhost:3000/api/v1/auth/line/callback

### 3. Supabase URL Configuration
Site URL：http://localhost:5173
Redirect URLs：http://localhost:5173/auth/callback

### 4. 重啟後端 + 前端
npm run dev:backend
npm run dev:frontend

點「使用 LINE 登入」→ 應跳到 LINE 授權頁（不是 JSON 錯誤）

## 員工 Onboarding（首次登入必填）

LINE / OAuth 登入後，若尚未加入飯店，會導向 `/register/complete`（Google 表單風格）。

### 加入現有飯店（一般員工）
1. 向管理員索取**飯店代碼**（slug，例：demo-hotel）
2. 填寫：飯店代碼、姓名、部門·職位
3. 提交後系統建立 User 並綁定 `lineUserId`（LINE 登入者）
4. 之後推播依部門路由，不會傳錯人

可選職位：
- 前台人員（FRONT_DESK）
- 房務人員（HOUSEKEEPING）
- 工程師（ENGINEER）
- 餐飲人員（FOOD_BEVERAGE）

### 建立新飯店（管理員）
同一頁切換「建立新飯店（管理員）」分頁：
- 填寫飯店名稱、飯店代碼、管理員姓名
- 建立 Tenant + 第一位 ADMIN 使用者

### Email 註冊
/register → 建立 Supabase 帳號 → 同樣導向 /register/complete 完成 onboarding

### 相關 API
GET  /api/v1/auth/tenants/lookup?slug=   查詢飯店是否存在
POST /api/v1/auth/join                   加入現有飯店
POST /api/v1/auth/register               建立新飯店租戶
GET  /api/v1/auth/status                 檢查是否已完成 onboarding

## LINE 推播（glog 官方 LINE 助手）

**統一使用 LINE Messaging API**，不再使用 LINE Notify 群組 token。

### backend/.env 設定
LINE_MESSAGING_ACCESS_TOKEN=（LINE Developers → Messaging API → Channel access token）

### 推播條件（缺一不可）
1. 後端已設定 LINE_MESSAGING_ACCESS_TOKEN
2. 員工已完成 onboarding（有 User 紀錄）
3. 員工曾用 LINE 登入（系統寫入 lineUserId）

### 推播路由邏輯
依 User.role 推導 Department，推播給同部門員工 + ADMIN：
- 工程工單 → 工程部（ENGINEERING）
- 工單逾時升級 → 管理層 + 前台
- 交班日誌 → 該部門 + 管理員
- 服務請求 → 目標部門
- 住客請求 → 目標部門（逾時另推前台）

### 進階設定（選填）
DEPARTMENT_ACCEPT_MINUTES=5      部門任務幾分鐘內須接單，逾時再次推播該部門
TICKET_ESCALATION_MINUTES=15     工單無人接單升級時間（分鐘，非部門接單流程）
ALERT_POLL_INTERVAL_MS=60000     背景提醒輪詢間隔（毫秒）

### LINE 部門任務流程（例：302 需要枕頭）
1. 10:30 前台 LINE 傳「302 需要一個枕頭」→ 推播房務部（不指定個人）
2. 房務同仁回覆「接單」認領任務
3. 10:35 若仍無人接單 → 再次 LINE 提醒房務部
4. 完成後先傳照片 → 回覆「完成」或「完成 已補枕頭」→ 通知前台已結案

指令：
- 接單：認領部門內最舊的待接單任務
- 完成：須先傳照片，再文字回覆「完成」

網站後台（服務請求 /service-requests）：
- 房務／前台：「待接單」分頁 → 點「接單」
- 「進行中」分頁 → 上傳照片 →「完成並通知前台」
- 工程師：工程工單詳情頁 OPEN 狀態可點「接單」

## 智慧通報與提醒

背景排程（alertSchedulerService）每 60 秒輪詢：

1. **交班日誌自動開工單**
   備註含房號 + 維修關鍵字 → 自動建立工程工單 + LINE 推播工程部

2. **工單逾時升級**
   新工單建立後 N 分鐘無人接單 → 推播管理層 + 前台

3. **住客請求 SLA**
   住客掃碼請求 30 分鐘未處理 → 推播原負責部門 + 前台

## AI 交班日誌

路徑：左側選單「交班日誌」/logbook

各部門獨立 logbook（前台、餐飲、房務、工程、管理層），管理員可切換部門檢視。

班別（台北時間）：
- 早班 07:00–15:00
- 中班 15:00–23:00
- 晚班 23:00–07:00

使用流程：
1. 本班期間新增備註（客訴、臨時狀況等）
2. 系統自動彙整工單、地點、庫存、成本
3. 交班前點「完成交班 · 產生 AI 摘要」
4. 接班同仁打開交班日誌即可看上一班摘要
5. 交班後自動透過 glog LINE 助手推播給該部門同仁與管理員

進階 AI（選填）：backend/.env 加入 OPENAI_API_KEY，未設定則使用內建規則摘要

## 跨部門服務請求（餐廳預約）

路徑：服務請求 /service-requests

流程範例（305 房林先生中餐廳預約）：
1. 前台 → 建立服務請求（房號、客人、預約 12:00、提醒 11:30）
2. 自動送至餐飲部收件匣 + LINE 推播
3. 餐飲部（角色 FOOD_BEVERAGE）或管理員 → 確認預約並填回覆
4. 前台「我送出的」可看到確認結果
5. 11:30 頂部橫幅提醒前台通知客人 → 點「已通知客人」

新增餐飲部員工：請該員工用 LINE 登入並在 onboarding 選「餐飲部 · 餐飲人員」

