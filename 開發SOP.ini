## 資料庫策略（重要）
- **主資料庫：MongoDB Atlas**（`backend/.env` → `MONGO_URI`）
- **認證：Mongo Auth + JWT**（`JWT_SECRET`；Email／LINE／Manager 皆走後端 `/api/v1/auth/*`）
- **Supabase Postgres（Prisma）已凍結**：業務 API 過渡期仍可能讀寫，勿再擴充 schema
- 前端正式站 Cloudflare 只需：`VITE_API_BASE_URL=https://api.glog.work`（不再需要 VITE_SUPABASE_*）
- 歷史資料可用 `backend/scripts/migrate.js` 搬到 MongoDB

